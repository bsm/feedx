name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  go:
    uses: bsm/misc/.github/workflows/test-go.yml@main
  ruby:
    uses: bsm/misc/.github/workflows/test-ruby.yml@main
  bsm:
    runs-on: bsm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache-dependency-path: ./go.sum
      - name: Run tests
        run: go test ./...
